# Copy to worker/config.yml and edit for your workstation.

data_dir: .data/worker
notes_dir: .data/notes
trusted_roots:
  - /home/divyesh-nandlal-vishwakarma/Desktop/Divyesh
auto_approve_trusted_projects: true
code:
  worktrees_dir: .data/code-worktrees
  code_server_url: "http://127.0.0.1:8766"
  # Example once code-server is behind Cloudflare:
  code_server_folder_url_template: "http://127.0.0.1:8766/?folder={folder}"
  # Keep workspace-write where bubblewrap works; use danger-full-access only behind approval
  # and with worktree isolation when the service cannot create Codex's Linux sandbox.
  codex_sandbox: workspace-write
  codex_approval_policy: never
max_parallel_jobs: 2
default_require_approval: true

auto_run_intents:
  - capture_idea
  - research_note
  - document_task
  - repo_status

approval_required_intents:
  - code_task
  - codex_task
  - claude_task
  - script_task
  - docker_compose
  - browser_task
  - job_packet

repo_required_intents:
  - repo_status
  - script_task

intent_tools:
  code_task: codex
  codex_task: codex
  claude_task: claude

repos:
  dagent:
    path: /home/divyesh-nandlal-vishwakarma/Desktop/Divyesh/dAgent
    github_account: personal
    default_tool: codex
    allowed_intents:
      - repo_status
      - code_task
      - codex_task
      - claude_task
      - script_task

tools:
  # Omit codex here to use the built-in code-task command.
  claude:
    command:
      - claude
      - -p
      - "{task}"
    timeout_seconds: 7200
    allowed_repos:
      - "*"

scripts:
  test:
    command:
      - bash
      - -lc
      - "if [ -f package.json ]; then npm test; elif [ -f pyproject.toml ]; then pytest; else echo 'No known test command'; fi"
    timeout_seconds: 1800
    allowed_repos:
      - "*"

notifications:
  ntfy_url: ""
  ntfy_topics:
    - dagent
  ntfy_token: ""
